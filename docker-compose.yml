version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_api_app
    ports:
      - '4000:4000'
    environment:
    - NODE_ENV=${NODE_ENV:-development}
    - PORT=${PORT:-4000}
    - DB_HOST=postgres
    - DB_PORT=${DB_PORT:-5432}
    - DB_USER=${DB_USER:-test_user}
    - DB_PASSWORD=${DB_PASSWORD:-test_parol123}
    - DB_NAME=${DB_NAME:-test}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: todo_api_db
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=${DB_USER:-test_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-test_parol123}
      - POSTGRES_DB=${DB_NAME:-test}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-test_user} -d ${DB_NAME:-test}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data: