name: Deploy Todo API (PM2)

on:
  push:
    branches:
      - main

env:
  APP_DIR: /root/todo_api
  APP_NAME: todo_api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_SERVER }}
          username: ${{ secrets.BACKEND_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ${{ env.APP_DIR }}

            echo "==> Git pull..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> .env tekshirilmoqda..."
            if [ ! -f .env ]; then
                echo "==> .env topilmadi, yaratilmoqda..."
                cat > .env << 'ENVEOF'
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=4000
            ENVEOF
                echo "==> .env yaratildi."
            else
                echo "==> .env allaqachon mavjud, o'tkazib yuborilmoqda."
            fi

            echo "==> npm install..."
            npm install

            echo "==> npm run build..."
            npm run build

            echo "==> PM2 restart..."
            pm2 restart ${{ env.APP_NAME }} || pm2 start dist/main.js --name ${{ env.APP_NAME }}

            echo "==> Done!"

      - name: Notify Telegram - Success
        if: success()
        run: |
          MESSAGE="✅ BUILD SUCCESS

          Project: Todo API (Production)
          Build: #${{ github.run_number }}
          Branch: main
          Author: ${{ github.actor }}
          Commit: ${{ github.sha }}

          ✨ Deployment muvaffaqiyatli yakunlandi!
          🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE"

      - name: Notify Telegram - Failure
        if: failure()
        run: |
          MESSAGE="❌ BUILD FAILED

          Project: Todo API (Production)
          Build: #${{ github.run_number }}
          Branch: main
          Author: ${{ github.actor }}

          🔍 Loglarni ko'rish:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MESSAGE"